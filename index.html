<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// ⚙️  配置区：填入你的 Supabase 信息
// Supabase Dashboard → Settings → API
// ============================================================
const SUPABASE_URL  = 'https://zlkivrqahzkkbvirvgtf.supabase.co';   // 如 https://xxxx.supabase.co
const SUPABASE_ANON = 'sb_publishable__Y0pG-rf9L9e6zAvakh8Xw_xK35eLK7';       // anon public key

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── 数据加载：从 Supabase 读取活动和配置 ──
async function loadRemoteData() {
  try {
    // 读取活动（已上架的）
    const { data: acts, error: e1 } = await sb
      .from('activities')
      .select('*')
      .eq('status', 'on')
      .order('id');
    if (e1) throw e1;

    // 读取站点配置
    const { data: cfgs, error: e2 } = await sb
      .from('site_config')
      .select('*');
    if (e2) throw e2;

    // 转换格式（Supabase字段名 → 系统字段名）
    ACTS = acts.map(a => ({
      id:    a.id,
      name:  a.name,
      cat:   a.category,
      e:     a.emoji || '✨',
      min:   a.min_people,
      max:   a.max_people,
      dur:   a.duration,
      price: a.price,
      ven:   a.venue || '',
      desc:  a.description || '',
      mat:   a.materials || '',
      out:   a.deliverables || '',
      imgs:  a.images || [],
      st:    a.status,
      hot:   a.is_hot,
      date:  a.event_date || '',
      sg:    a.signup_count || 0
    }));

    // 应用配置
    const cfg = {};
    (cfgs || []).forEach(c => { cfg[c.key] = c.value; });
    applyRemoteCfg(cfg);

    // 渲染
    rFront('全部');
    updateStats();
    startFrontPolling(); // 启动轮询
  } catch (err) {
    console.warn('Supabase读取失败，使用本地数据:', err.message);
    // 回退到本地数据
    ACTS = loadData();
    applyCfg();
    rFront('全部');
  }
}

function applyRemoteCfg(cfg) {
  const heroTag = document.getElementById('heroTag');
  const siteName = document.getElementById('siteName');
  const heroSub  = document.getElementById('heroSub');
  const heroTel  = document.getElementById('heroTel');
  const heroTelNum = document.getElementById('heroTelNum');
  if (heroTag)  heroTag.textContent  = cfg.heroTag  || '✦ 社群主理人活动手册 2026';
  if (siteName) siteName.textContent = cfg.siteName || '开开华彩';
  if (heroSub)  heroSub.textContent  = cfg.heroSub  || '';
  const tel = (cfg.tel || '').trim();
  if (heroTel && heroTelNum) {
    if (tel) { heroTelNum.textContent = tel; heroTel.style.display = 'flex'; }
    else { heroTel.style.display = 'none'; }
  }
}

function updateStats() {
  const total = ACTS.filter(a => a.st === 'on').length;
  const sgs   = ACTS.reduce((s, a) => s + (a.sg || 0), 0);
  const fsT = document.getElementById('fs-t');
  const fsS = document.getElementById('fs-s');
  if (fsT) fsT.textContent = total;
  if (fsS) fsS.textContent = sgs.toLocaleString();
}

// ── 报名提交到 Supabase ──
async function submitToSupabase(actId, name, phone, count, date, remark) {
  const a = ACTS.find(x => x.id === actId);
  const ref = new URLSearchParams(window.location.search).get('ref') || '';
  const { error } = await sb.from('signups').insert({
    activity_id:   actId,
    activity_name: a ? a.name : '',
    user_name:     name,
    user_phone:    phone,
    people_count:  count,
    event_date:    date || null,
    remark:        remark || '',
    ref_account:   ref,
    status:        '待确认',
    amount:        a ? a.price : ''
  });
  if (error) throw error;

  // 更新报名人数（乐观更新本地）
  if (a) a.sg = (a.sg || 0) + count;

  // 远程也更新 signup_count
  await sb.from('activities')
    .update({ signup_count: (a ? a.sg : count) })
    .eq('id', actId);
}
</script>

// ── 数据层：从localStorage读，无则用默认 ──
function loadData(){
  try{
    const raw=localStorage.getItem('kkh_acts');
    if(raw){
      const saved=JSON.parse(raw);
      // 如果本地存储的活动数量少于内置数量，说明是旧数据，强制用最新的
      if(saved.length < DEFAULT_ACTS.length){
        localStorage.setItem('kkh_acts',JSON.stringify(DEFAULT_ACTS));
        return DEFAULT_ACTS;
      }
      return saved;
    }
    return DEFAULT_ACTS;
  }catch(e){return DEFAULT_ACTS;}
}
function loadCfg(){
  try{
    const raw=localStorage.getItem('kkh_cfg');
    return raw?JSON.parse(raw):{heroTag:'✦ 社群主理人活动手册 2026',siteName:'开开华彩',heroSub:'线下文娱俱乐部 · 一起变年轻 · 用爱和科技为父母做好产品'};
  }catch(e){return {heroTag:'✦ 社群主理人活动手册 2026',siteName:'开开华彩',heroSub:'线下文娱俱乐部 · 一起变年轻 · 用爱和科技为父母做好产品'};}
}

let ACTS=loadData();
let curCat='全部';

// 应用配置
function applyCfg(){
  const c=loadCfg();
  document.getElementById('heroTag').textContent=c.heroTag||'✦ 社群主理人活动手册 2026';
  document.getElementById('siteName').textContent=c.siteName||'开开华彩';
  document.getElementById('heroSub').textContent=c.heroSub||'';
  // 电话号码
  const telWrap=document.getElementById('heroTel');
  const telNum=document.getElementById('heroTelNum');
  const tel=(c.tel||'').trim();
  if(telWrap&&telNum){
    if(tel){
      telNum.textContent=tel;
      telWrap.style.display='flex';
    }else{
      telWrap.style.display='none';
    }
  }
}

// 监听localStorage变化（后台修改时实时更新）
window.addEventListener('storage',function(e){
  if(e.key==='kkh_acts'){ACTS=loadData();rFront(curCat,document.getElementById('fsi').value);}
  if(e.key==='kkh_cfg'){applyCfg();}

const carState={};
function carGo(id,i){
  const inner=document.getElementById('car-inner-'+id);
  const dots=document.getElementById('car-dots-'+id);
  if(!inner)return;
  const total=inner.children.length;
  i=((i%total)+total)%total;

  if(dots){

// ══ TabBar 切换 ══
function switchTab(tab) {
  // 隐藏所有view
  ['v-home','v-detail','v-myorder'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('on');
  });
  // 更新tab高亮
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('on'));

  if (tab === 'home') {
    document.getElementById('v-home').classList.add('on');
    document.getElementById('tab-home').classList.add('on');
  } else if (tab === 'myorder') {
    document.getElementById('v-myorder').classList.add('on');
    document.getElementById('tab-myorder').classList.add('on');
    window.scrollTo(0, 0);
    // 自动填入上次报名的手机号
    const savedPhone = sessionStorage.getItem('kkh_my_phone');
    if(savedPhone && !document.getElementById('q-phone').value){
      document.getElementById('q-phone').value = savedPhone;
      setTimeout(queryOrders, 300);
    }
  } else if (tab === 'detail') {
    document.getElementById('v-detail').classList.add('on');
    document.getElementById('tab-home').classList.add('on');
  }
}

  }
  const resultEl = document.getElementById('q-result');
  resultEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--mu);font-size:13px;">查询中…</div>';

  // 优先从 Supabase 查询
  if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      const { data, error } = await sb
        .from('signups')
        .select('*')
        .eq('user_phone', phone)
        .order('created_at', { ascending: false });
      if (error) throw error;
      renderOrderResult(data, phone);
      return;
    } catch (err) {
      console.warn('Supabase查询失败，尝试本地:', err);
    }
  }

  // 回退：查本地 localStorage
  const local = JSON.parse(localStorage.getItem('kkh_sg') || '[]');
  const filtered = local.filter(r => r.p && r.p.replace(/\*/g, '') !== '' &&
    (r.p === phone || r.p.replace(/\*{4}/, '').replace(/(\d{3})(\d{4})/, '$1$2') === phone.slice(0,3) + phone.slice(-4)));
  renderOrderResult(filtered.map(r => ({
    activity_name: r.a,
    people_count:  r.c,
    event_date:    r.t,
    status:        r.s || '待确认',
    amount:        r.amt,
    created_at:    r.t,
    remark:        r.remark || ''
  })), phone);
}

function renderOrderResult(orders, phone) {
  const resultEl = document.getElementById('q-result');
  if (!orders || !orders.length) {
    resultEl.innerHTML = `
      <div class="qempty">
        <div class="qempty-icon">📋</div>
        <div class="qempty-t">暂无报名记录</div>
        <div class="qempty-s">手机号 ${phone} 尚未有报名记录<br>如有疑问请联系主理人</div>
      </div>`;
    return;
  }

  const statusMap = { '已确认':'st-confirmed','待确认':'st-pending','待支付':'st-pending','已取消':'st-cancelled' };

  resultEl.innerHTML = `
    <div style="font-size:13px;color:var(--mu);padding:14px 2px 6px;">
      共找到 <b style="color:var(--or)">${orders.length}</b> 条报名记录
    </div>` +
    orders.map(o => {
      const stCls = statusMap[o.status] || 'st-pending';
      const dateStr = o.created_at ? new Date(o.created_at).toLocaleDateString('zh-CN') : (o.event_date || '—');
      return `
        <div class="ord-card">
          <div class="ord-hd">
            <div class="ord-name">${o.activity_name || '活动'}</div>
            <span class="ord-status ${stCls}">${o.status || '待确认'}</span>
          </div>
          <div class="ord-body">
            <div class="ord-row"><span class="ord-lbl">报名人数</span><span class="ord-val">${o.people_count || 1}人</span></div>
            <div class="ord-row"><span class="ord-lbl">活动日期</span><span class="ord-val">${o.event_date || '待确认'}</span></div>
            <div class="ord-row"><span class="ord-lbl">报名金额</span><span class="ord-val ord-price">${o.amount || '—'}</span></div>
            <div class="ord-row"><span class="ord-lbl">报名时间</span><span class="ord-val">${dateStr}</span></div>
            ${o.remark ? `<div class="ord-row"><span class="ord-lbl">备注</span><span class="ord-val">${o.remark}</span></div>` : ''}
          </div>
        </div>`;
    }).join('') +
    `<div class="ord-tip">如需修改或取消报名<br>请联系主理人处理</div>`;
}

// 回车触发查询
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('q-phone');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') queryOrders(); });
});

</script>
</body>
